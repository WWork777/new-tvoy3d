        - paragraph [ref=e37]: Сравниваем популярные материалы по прочности, температурной стойкости, внешнему виду и применению в прототипах, корпусах и декоративных изделиях.
      - 'img "PLA, ABS или PETG: какой пластик выбрать для 3D-печати" [ref=e39]'
      - generic [ref=e40]:
        - generic [ref=e41]:
          - heading "PLA — для макетов и визуальных моделей" [level=2] [ref=e42]
          - paragraph [ref=e43]: PLA хорошо подходит для презентационных образцов, декора и деталей без серьёзной нагрузки. Он аккуратно печатается, даёт чистую поверхность и доступен в большом количестве цветов.
        - generic [ref=e44]:
          - heading "ABS — для корпусов и механики" [level=2] [ref=e45]
          - paragraph [ref=e46]: ABS прочнее и лучше переносит нагрев, поэтому его часто выбирают для корпусов, кронштейнов и функциональных деталей. Для красивого результата обычно нужна постобработка.
        - generic [ref=e47]:
          - heading "PETG — универсальный вариант" [level=2] [ref=e48]
          - paragraph [ref=e49]: PETG сочетает прочность, умеренную гибкость и стойкость к влаге. Его часто выбирают, когда нужна рабочая деталь без сложной финишной обработки.
